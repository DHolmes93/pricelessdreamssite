[build]
  command = "npm run build"
  publish = "dist"

# Expo static export writes flat HTML files (products.html, contact.html).
# These rewrites serve them at clean URLs without a redirect.
[[redirects]]
  from = "/products"
  to = "/products.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200
